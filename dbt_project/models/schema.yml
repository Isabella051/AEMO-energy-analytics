version: 2

models:
  - name: stg_price_and_demand
    description: "Cleaned 5-min price & demand — Silver layer"
    columns:
      - name: region_id
        tests:
          - not_null
          - accepted_values:
              values: [NSW1, VIC1, QLD1, SA1, TAS1]
      - name: settlement_ts
        tests: [not_null]
      - name: rrp_aud_mwh
        tests: [not_null]
      - name: time_of_use_band
        tests:
          - accepted_values:
              values: [peak, off_peak]

  - name: fct_energy_cost
    description: "Daily energy cost fact table — Gold layer, Power BI ready"
    columns:
      - name: region_id
        tests: [not_null]
      - name: settlement_date
        tests: [not_null]
      - name: avg_price_aud_mwh
        tests: [not_null]

  - name: dim_region
    description: "NEM region reference dimension"
    columns:
      - name: region_id
        tests: [not_null, unique]
