name: AEMO Analytics CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 21 * * *"

env:
  DBT_PROFILES_DIR: ./dbt_project

jobs:
  dbt-test:
    name: dbt build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install dbt-duckdb nemdata pandas pyarrow apscheduler requests \
                      azure-storage-blob sqlalchemy pyodbc fsspec

      - name: Pull sample AEMO data (last 60 days)
        run: python ingestion/ingest.py --lookback-days 60
        env:
          BRONZE_PATH: ./data/bronze

      - name: Generate dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << PROFILE
          aemo_energy:
            outputs:
              dev:
                type: duckdb
                path: ./dbt_project/dev.duckdb
                threads: 1
                extensions:
                  - parquet
                external_root: .
              ci:
                type: duckdb
                path: ./dbt_project/ci.duckdb
                threads: 1
                extensions:
                  - parquet
                external_root: .
            target: ci
          PROFILE

      - name: Update stg model path for CI
        run: |
          sed -i "s|/Users/isabella/Downloads/aemo-energy-analytics/||g" \
            dbt_project/models/staging/stg_price_and_demand.sql

      - name: dbt build
        working-directory: dbt_project
        run: dbt build --target ci

  deploy:
    name: Deploy to Azure SQL
    runs-on: ubuntu-latest
    needs: dbt-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas pyarrow azure-storage-blob sqlalchemy \
                      pyodbc requests fsspec

      - name: Install ODBC Driver
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18

      - name: Pull latest AEMO data
        run: python ingestion/ingest.py --lookback-days 60
        env:
          BRONZE_PATH: ./data/bronze

      - name: Load to Azure SQL
        run: python ingestion/load_to_azure_sql.py
        env:
          ADLS_CONNECTION_STRING: ${{ secrets.ADLS_CONNECTION_STRING }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          BRONZE_PATH: ./data/bronze
